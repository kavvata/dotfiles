background {
    monitor =
    path = $HOME/.lockscreen
    blur_size = 3
    blur_passes = 2
}

input-field {
    monitor =
    size = 133, 33
    outline_thickness = 1
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1 # -1 default circle, -2 follow input-field rounding
    outer_color = rgba(64, 64, 64, 1)        # #404040
    inner_color = rgba(25, 25, 25, 0.90)     # #191919
    font_color = rgba(187, 187, 187, 1)      # #BBBBBB
    font_family = IosevkaTermSlab NF
    fade_on_empty = true
    fade_timeout = 1000 # Milliseconds before fade_on_empty is triggered.
    placeholder_text = <i>Input Password...</i> # Text rendered in the input box when it's empty.
    hide_input = false
    rounding = -1 # -1 means complete rounding (circle/oval)
    check_color = rgb(214, 140, 103)         # #D68C67
    fail_color = rgb(222, 110, 124)          # #DE6E7C
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # can be set to empty
    fail_transition = 300 # transition time in ms between normal outer_color and fail_color
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = false # change color if numlock is off
    swap_font_color = false # see below
    position = 0, 32
    halign = center
    valign = bottom
}

label {
    monitor =
    # Clock (24-hour format with seconds for rhythmic symmetry)
    text = cmd[update:1000] echo "$(date '+%H:%M:%S')"
    color = rgba(187, 187, 187, 0.85) # #BBBBBB

    font_size = 16
    font_family = IosevkaTermSlab NF Bold

    # Precise positioning for visual balance
    position = 0, 80
    halign = center
    valign = botton

}
